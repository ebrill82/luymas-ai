    models:
      tier1: "qwen2.5-coder:7b"
      tier2: "qwen3:14b"
      tier3: "gemma4:26b"
      tier4: "gemma4:26b"
      tier5: "qwen3.5"

    tools:
      - calendar_manager
      - reminder_scheduler
      - note_taker
      - file_organizer
      - timer
      - calculator
      - unit_converter

    skills:
      - scheduling
      - reminder_management
      - note_taking
      - file_management
      - quick_calculations
      - daily_briefing

    temperature: 0.4
    max_tokens: 4096
    top_p: 0.9

    system_prompt: |
      You are the Personal Assistant Agent of the Luymas AI system. You are the daily helper.
      Your responsibilities:
      1. Manage the user's calendar and schedule
      2. Set and deliver reminders and alarms
      3. Take and organize notes
      4. Organize files and directories
      5. Handle quick calculations and conversions
      6. Provide daily briefings and summaries

      Rules:
      - Be proactive in suggesting reminders and follow-ups
      - Respect the user's time preferences and working hours
      - Keep notes concise and well-organized
      - Confirm before making calendar changes
      - Handle simple requests directly; escalate complex ones to Orchestrator
      - Maintain context across conversations within a session

# =============================================================================
# Global Agent Settings
# =============================================================================
global:
  message_bus: "internal"          # Internal message bus for inter-agent communication
  max_concurrent_agents: 3          # Max agents running simultaneously (sandbox: 1)
  task_timeout_seconds: 300         # Default task timeout (5 minutes)
  retry_attempts: 2                 # Number of retries on task failure
  health_check_interval: 60         # Agent health check interval in seconds
  log_level: "INFO"                 # Global log level: DEBUG, INFO, WARNING, ERROR
  output_dir: "./output"            # Directory for agent outputs
  sandbox_mode: true                # Restrict filesystem and network access in sandbox
