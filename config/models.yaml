# =============================================================================
# Hardware Tier Quick Reference
# =============================================================================
hardware_tiers:
  tier1:
    description: "8GB RAM, no GPU (sandbox / minimal)"
    models:
      - "deepseek-r1:8b"
      - "qwen2.5-coder:7b"
      - "deepseek-coder-v2-lite"
      - "z-image-turbo"
    max_concurrent_models: 1
    total_disk_gb: 25

  tier2:
    description: "16GB RAM, no GPU"
    models:
      - "deepseek-r1:14b"
      - "qwen3:14b"
      - "qwen2.5-coder:7b"
      - "gemma4:9b"
      - "z-image-turbo"
    max_concurrent_models: 2
    total_disk_gb: 50

  tier3:
    description: "32GB RAM + 12GB VRAM GPU"
    models:
      - "qwen3:30b"
      - "qwen2.5-coder:32b"
      - "gemma4:26b"
      - "deepseek-r1:14b"
      - "flux2-schnell"
    max_concurrent_models: 2
    total_disk_gb: 80

  tier4:
    description: "64GB RAM + 24GB VRAM GPU"
    models:
      - "qwen3.5"
      - "qwen2.5-coder:32b"
      - "gemma4:26b"
      - "glm5"
      - "flux2-dev"
      - "deepseek-r1:14b"
    max_concurrent_models: 3
    total_disk_gb: 150

  tier5:
    description: "128GB+ RAM + 48GB+ VRAM GPU (premium)"
    models:
      - "deepseek-v4-pro"
      - "kimi-k2.5"
      - "deepseek-r1:671b"
      - "glm5"
      - "flux2-dev"
      - "qwen3.5"
